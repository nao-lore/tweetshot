<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .status.detected {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.3);
    }

    .status.not-detected {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tweet-url {
      font-size: 12px;
      color: #999;
      word-break: break-all;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 12px 0;
    }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 12px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #f5576c);
      color: #fff;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary:not(:disabled):hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TweetShot</h1>
  </div>

  <div id="status" class="status not-detected">
    ツイートページを開いてください
  </div>

  <hr class="divider">

  <label for="urlInput">ツイートURLを入力</label>
  <input type="text" id="urlInput" placeholder="https://x.com/user/status/123...">

  <button class="btn btn-primary" id="openBtn" disabled>
    TweetShotで開く
  </button>

  <script src="popup.js"></script>
</body>
</html>
